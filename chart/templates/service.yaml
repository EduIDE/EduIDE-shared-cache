{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  labels:
    {{- include "eduide-shared-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    {{- include "eduide-shared-cache.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cache-server
{{- end }}
