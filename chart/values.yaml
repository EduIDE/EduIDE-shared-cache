# ============================================================
# Cache Server
# ============================================================

enabled: true

image:
  repository: ghcr.io/eduide/eduide-shared-cache/gradle-cache
  # Default is the Chart Version
  tag: ""

# Authentication credentials (role-based)
# reader: read-only access (for EduIDE / students)
# writer: read-write access (for CI/CD, admin, cache pre-warming)
auth:
  enabled: true
  reader:
    username: "reader"
    password: "changeme-reader"
  writer:
    username: "writer"
    password: "changeme-writer"

# Cache settings (shared by Gradle and Bazel)
cache:
  # Maximum entry size in MB
  maxEntrySizeMB: 100
  # Verify SHA-256 hash of Bazel CAS blobs on PUT
  verifyCASHash: true

tls:
  enabled: false
  # Kubernetes secret name containing tls.crt and tls.key
  secretName: ""

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# ============================================================
# Redis (internal storage backend)
# ============================================================

redis:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# ============================================================
# Monitoring
# ============================================================

monitoring:
  # Create ServiceMonitor resources for Prometheus discovery.
  # Requires the Prometheus Operator to be installed in the cluster.
  enabled: true

# ============================================================
# Reposilite (Maven/Gradle dependency proxy)
# ============================================================

reposilite:
  enabled: true
  fullnameOverride: "eduide-shared-cache-reposilite"

  # Admin access token for Reposilite management
  adminToken: "changeme"

  # Prometheus credentials are auto-generated on first install and stored in:
  #   eduide-shared-cache-reposilite-secrets  (keys: prometheusUsername, prometheusPassword)

  # Maven/Gradle repositories to proxy and cache
  proxyRepositories:
    - "https://repo1.maven.org/maven2"
    - "https://plugins.gradle.org/m2"

  # Persistence for cached artifacts
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "csi-rbd-sc"

  # Resource limits
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # ------------------------------------------------------------
  # Internal: subchart wiring — not intended for user modification
  # ------------------------------------------------------------
  env:
    - name: JAVA_OPTS
      value: "-Xmx128M"
    - name: REPOSILITE_ADMIN_TOKEN
      valueFrom:
        secretKeyRef:
          name: eduide-shared-cache-reposilite-secrets
          key: adminToken
    - name: REPOSILITE_OPTS
      value: "--token $(REPOSILITE_ADMIN_TOKEN) --shared-configuration=/etc/reposilite/configuration.shared.json"
    - name: REPOSILITE_PROMETHEUS_USER
      valueFrom:
        secretKeyRef:
          name: eduide-shared-cache-reposilite-secrets
          key: prometheusUsername
    - name: REPOSILITE_PROMETHEUS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: eduide-shared-cache-reposilite-secrets
          key: prometheusPassword

  deployment:
    initContainers:
      - name: download-prometheus-plugin
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            wget -O /plugins/prometheus-plugin.jar \
              "https://maven.reposilite.com/releases/com/reposilite/plugin/prometheus-plugin/3.5.26/prometheus-plugin-3.5.26-all.jar"
        volumeMounts:
          - name: plugins
            mountPath: /plugins
    additionalVolumes:
      - name: shared-config
        configMap:
          name: reposilite-shared-config
      - name: plugins
        emptyDir: {}
    additionalVolumeMounts:
      - name: shared-config
        mountPath: /etc/reposilite/configuration.shared.json
        subPath: configuration.shared.json
        readOnly: true
      - name: plugins
        mountPath: /app/data/plugins
